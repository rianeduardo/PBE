<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro de Material | Sistema de Estoque e Patrimônio</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>

<body>
    <div th:include="~{fragments/header :: header}"></div>

    <main class="senai-main">
        <section class="senai-hero">
            <div class="senai-shell" style="justify-content:center;">
                <div class="senai-card" style="width: 100%; max-width: 600px;">
                    <h1 class="senai-title" style="font-size: 22px;"
                        th:text="${material.id == null ? 'Novo Material' : 'Editar Material'}">Novo Material
                    </h1>

                    <form th:action="@{/app/materiais/salvar}" th:object="${material}" method="post" class="senai-form">
                        <input type="hidden" th:field="*{id}" />

                        <label class="senai-label" for="nome">Nome do Material</label>
                        <input class="senai-input" type="text" id="nome" th:field="*{nome}"
                            placeholder="Ex: Multímetro Digital" required />


                        <label class="senai-label" for="categoria">Categoria</label>
                        <select class="senai-input" id="categoria" th:field="*{categoria}" required>
                            <option value="">Selecione uma categoria...</option>
                            <option th:each="cat : ${categorias}" th:value="${cat.idCategoria}" th:text="${cat.nome}">
                            </option>
                        </select>


                        <label class="senai-label" for="descricao">Descrição (Opcional)</label>
                        <input class="senai-input" id="descricao" th:field="*{descricao}"
                            placeholder="Detalhes técnicos ou observações..."></input>

                        <div class="senai-actions" style="margin-top: 12px; justify-content: flex-end;">
                            <a class="senai-link" th:href="@{/app/materiais}" style="margin-right: 12px;">Cancelar</a>
                            <button class="senai-button" type="submit">Salvar Material</button>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <div th:include="~{fragments/footer :: footer}"></div>
</body>

</html>
